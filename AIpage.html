<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Guess the Country</title>
  <style>
    body {

      font-family: Arial, sans-serif;
      text-align: center;
      background: #f4f4f4;
    }
    h1 {
      margin-top: 20px;
      
    }
    img {
      width: 300px;
      height: auto;
      border: 3px solid black;
      margin: 20px;
    }
    .options button {
      margin: 10px;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }
    #result {
      font-size: 20px;
      margin-top: 15px;
    }
  </style>
</head>
<body>
<a href="fromscratch.html"> Click here to go back </a>


  <h1>Guess the Country 🌍</h1>
  <img id="flag" src="">
  
  <div class="options" id="options"></div>
  
  <p id="result"></p>
  <button onclick="nextQuestion()">Next Question</button>

  <script>
    const countries = [
      { name: "France", flag: "https://flagcdn.com/w320/fr.png" },
      { name: "Japan", flag: "https://flagcdn.com/w320/jp.png" },
      { name: "Brazil", flag: "https://flagcdn.com/w320/br.png" },
      { name: "Canada", flag: "https://flagcdn.com/w320/ca.png" },
      { name: "Germany", flag: "https://flagcdn.com/w320/de.png" },
      { name: "Italy", flag: "https://flagcdn.com/w320/it.png" },
      { name: "United States", flag: "https://flagcdn.com/w320/us.png" }
    ];

    let current;

    function nextQuestion() {
      document.getElementById("result").textContent = "";
      
      current = countries[Math.floor(Math.random() * countries.length)];
      document.getElementById("flag").src = current.flag;

      let options = [current.name];

      while (options.length < 4) {
        let random = countries[Math.floor(Math.random() * countries.length)].name;
        if (!options.includes(random)) {
          options.push(random);
        }
      }

      options.sort(() => Math.random() - 0.5);

      let optionsDiv = document.getElementById("options");
      optionsDiv.innerHTML = "";

      options.forEach(option => {
        let btn = document.createElement("button");
        btn.textContent = option;
        btn.onclick = () => checkAnswer(option);
        optionsDiv.appendChild(btn);
      });
    }

    function checkAnswer(answer) {
      if (answer === current.name) {
        document.getElementById("result").textContent = "✅ Correct!";
      } else {
        document.getElementById("result").textContent = "❌ Wrong! It was " + current.name;
      }
    }

    nextQuestion();
  </script>

</body>
</html>
